<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- Labrador fur gradient: golden brown with shading -->
    <radialGradient id="labGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8b86d"/>
      <stop offset="40%" stop-color="#c8843a"/>
      <stop offset="80%" stop-color="#8a4e1a"/>
      <stop offset="100%" stop-color="#5a2e08"/>
    </radialGradient>
    <radialGradient id="labMuzzle" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5d4a0"/>
      <stop offset="60%" stop-color="#d4a060"/>
      <stop offset="100%" stop-color="#8a5020"/>
    </radialGradient>
    <radialGradient id="labEar" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b87030"/>
      <stop offset="100%" stop-color="#5a2e08"/>
    </radialGradient>
    <!-- Eagle gradient: white head, dark body -->
    <radialGradient id="eagleHead" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </radialGradient>
    <radialGradient id="eagleBody" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="60%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="eagleWing" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#666666"/>
      <stop offset="50%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <!-- Gold ring gradient -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="25%" stop-color="#c8a84b"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="75%" stop-color="#a07830"/>
      <stop offset="100%" stop-color="#f0d070"/>
    </linearGradient>
    <!-- Holly leaf gradient -->
    <linearGradient id="hollyLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d7a2d"/>
      <stop offset="50%" stop-color="#1a5c1a"/>
      <stop offset="100%" stop-color="#0d3d0d"/>
    </linearGradient>
    <!-- Berry gradient -->
    <radialGradient id="berryGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff6060"/>
      <stop offset="60%" stop-color="#cc1010"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#5a3010"/>
      <stop offset="60%" stop-color="#2a1008"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Nose gradient -->
    <radialGradient id="noseGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Inner background -->
    <radialGradient id="innerBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8f6f0"/>
      <stop offset="100%" stop-color="#ede8dc"/>
    </radialGradient>
  </defs>

  <!-- ===== OUTER RINGS ===== -->
  <circle cx="150" cy="150" r="148" fill="#111111"/>
  <circle cx="150" cy="150" r="143" fill="url(#goldRing)" stroke="none"/>
  <circle cx="150" cy="150" r="138" fill="#111111"/>
  <circle cx="150" cy="150" r="133" fill="white"/>

  <!-- ===== TEXT BAND ===== -->
  <circle cx="150" cy="150" r="126" fill="#111111"/>
  <!-- Text arc top -->
  <path id="topArc" d="M 30,150 A 120,120 0 0,1 270,150" fill="none"/>
  <text font-family="'Times New Roman', Times, serif" font-size="13" fill="#f0d070" font-weight="bold" letter-spacing="3">
    <textPath href="#topArc" startOffset="8%">REPUBLIC OF LABRADORIA</textPath>
  </text>
  <!-- Text arc bottom -->
  <path id="botArc" d="M 42,175 A 120,120 0 0,0 258,175" fill="none"/>
  <text font-family="'Times New Roman', Times, serif" font-size="11" fill="#f0d070" letter-spacing="2">
    <textPath href="#botArc" startOffset="12%">· ESTABLISHED MMXXVI ·</textPath>
  </text>

  <!-- ===== INNER CIRCLE ===== -->
  <circle cx="150" cy="150" r="112" fill="url(#innerBg)"/>
  <circle cx="150" cy="150" r="112" fill="none" stroke="url(#goldRing)" stroke-width="2"/>

  <!-- ===== HOLLY WREATH ===== -->
  <!-- Left side holly leaves -->
  <g>
    <!-- Leaf 1 left top -->
    <ellipse cx="52" cy="118" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-45 52 118)"/>
    <ellipse cx="47" cy="123" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-60 47 123)"/>
    <ellipse cx="44" cy="130" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-75 44 130)"/>
    <ellipse cx="43" cy="138" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-85 43 138)"/>
    <ellipse cx="43" cy="146" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-95 43 146)"/>
    <ellipse cx="44" cy="154" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-105 44 154)"/>
    <ellipse cx="47" cy="162" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-120 47 162)"/>
    <ellipse cx="52" cy="170" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(-135 52 170)"/>
    <!-- Left berries cluster -->
    <circle cx="42" cy="143" r="5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="36" cy="149" r="4.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="42" cy="155" r="4.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="37" cy="143" r="3.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <!-- Berry highlights -->
    <circle cx="40" cy="141" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="34" cy="147" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="40" cy="153" r="1.2" fill="white" opacity="0.5"/>
  </g>
  <!-- Right side holly leaves -->
  <g>
    <ellipse cx="248" cy="118" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(45 248 118)"/>
    <ellipse cx="253" cy="123" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(60 253 123)"/>
    <ellipse cx="256" cy="130" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(75 256 130)"/>
    <ellipse cx="257" cy="138" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(85 257 138)"/>
    <ellipse cx="257" cy="146" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(95 257 146)"/>
    <ellipse cx="256" cy="154" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(105 256 154)"/>
    <ellipse cx="253" cy="162" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(120 253 162)"/>
    <ellipse cx="248" cy="170" rx="10" ry="5" fill="url(#hollyLeaf)" transform="rotate(135 248 170)"/>
    <!-- Right berries cluster -->
    <circle cx="258" cy="143" r="5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="264" cy="149" r="4.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="258" cy="155" r="4.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <circle cx="263" cy="143" r="3.5" fill="url(#berryGrad)" stroke="#660000" stroke-width="0.5"/>
    <!-- Highlights -->
    <circle cx="256" cy="141" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="262" cy="147" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="256" cy="153" r="1.2" fill="white" opacity="0.5"/>
  </g>
  <!-- Bottom holly bow / ribbon -->
  <path d="M 120,255 Q 135,248 150,252 Q 165,248 180,255 Q 165,262 150,258 Q 135,262 120,255 Z" fill="#c8a84b"/>
  <path d="M 138,252 Q 150,244 162,252 Q 150,256 138,252 Z" fill="#f0d070"/>

  <!-- ===== EAGLE (upper portion) ===== -->
  <!-- Wings spread wide -->
  <!-- Left wing -->
  <path d="M 118,105 Q 90,88 65,98 Q 75,110 100,112 Q 110,112 118,108 Z" fill="url(#eagleWing)"/>
  <!-- Left wing feather tips -->
  <path d="M 88,95 Q 72,90 65,98 Q 72,100 88,98 Z" fill="#111111"/>
  <path d="M 78,98 Q 65,94 60,103 Q 67,104 80,102 Z" fill="#1a1a1a"/>
  <!-- Left wing highlight -->
  <path d="M 118,106 Q 96,92 78,98 Q 92,104 115,108 Z" fill="#888888" opacity="0.3"/>
  <!-- Right wing -->
  <path d="M 182,105 Q 210,88 235,98 Q 225,110 200,112 Q 190,112 182,108 Z" fill="url(#eagleWing)"/>
  <!-- Right wing feather tips -->
  <path d="M 212,95 Q 228,90 235,98 Q 228,100 212,98 Z" fill="#111111"/>
  <path d="M 222,98 Q 235,94 240,103 Q 233,104 220,102 Z" fill="#1a1a1a"/>
  <!-- Right wing highlight -->
  <path d="M 182,106 Q 204,92 222,98 Q 208,104 185,108 Z" fill="#888888" opacity="0.3"/>

  <!-- Eagle body -->
  <ellipse cx="150" cy="110" rx="20" ry="16" fill="url(#eagleBody)"/>
  <!-- Body sheen -->
  <ellipse cx="146" cy="104" rx="8" ry="5" fill="#888" opacity="0.3"/>

  <!-- Eagle white head -->
  <ellipse cx="150" cy="90" rx="15" ry="13" fill="url(#eagleHead)" stroke="#cccccc" stroke-width="0.5"/>
  <!-- Head shading -->
  <ellipse cx="155" cy="85" rx="6" ry="4" fill="white" opacity="0.6"/>
  <!-- Transition neck (dark collar) -->
  <ellipse cx="150" cy="100" rx="10" ry="5" fill="#444444"/>

  <!-- Eagle beak (gold/yellow) -->
  <path d="M 162,89 Q 176,93 174,99 Q 168,96 162,94 Z" fill="#c8a84b" stroke="#a07020" stroke-width="0.5"/>
  <!-- Beak lower jaw -->
  <path d="M 162,92 Q 172,96 170,101 Q 165,99 162,95 Z" fill="#a07020"/>

  <!-- Eagle eye -->
  <circle cx="158" cy="87" r="4" fill="#f0d070" stroke="#111" stroke-width="0.5"/>
  <circle cx="159" cy="87" r="2.5" fill="url(#eyeGrad)"/>
  <circle cx="160" cy="86" r="1" fill="white" opacity="0.7"/>
  <!-- Brow ridge -->
  <path d="M 154,83 Q 160,81 165,84" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Eagle tail feathers -->
  <path d="M 138,123 Q 144,130 150,132 Q 156,130 162,123 Q 155,127 150,128 Q 145,127 138,123 Z" fill="#333333"/>

  <!-- Talons gripping Labrador's head -->
  <path d="M 138,122 Q 132,128 130,133 Q 134,130 140,126 Z" fill="#333333"/>
  <path d="M 162,122 Q 168,128 170,133 Q 166,130 160,126 Z" fill="#333333"/>
  <!-- Talon claws left -->
  <path d="M 130,133 Q 126,137 124,140" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 132,135 Q 128,140 126,143" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Talon claws right -->
  <path d="M 170,133 Q 174,137 176,140" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 168,135 Q 172,140 174,143" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== LABRADOR HEAD (lower, main) ===== -->
  <!-- Head base shadow -->
  <ellipse cx="152" cy="185" rx="40" ry="6" fill="#00000022"/>
  <!-- Ears (behind head) -->
  <!-- Left ear -->
  <path d="M 110,152 Q 100,158 98,175 Q 102,182 112,185 Q 118,175 120,162 Z" fill="url(#labEar)"/>
  <!-- Right ear -->
  <path d="M 190,152 Q 200,158 202,175 Q 198,182 188,185 Q 182,175 180,162 Z" fill="url(#labEar)"/>
  <!-- Ear inner shading left -->
  <path d="M 112,158 Q 104,163 103,177 Q 107,181 112,183 Q 116,175 118,164 Z" fill="#7a3e10" opacity="0.5"/>
  <!-- Ear inner shading right -->
  <path d="M 188,158 Q 196,163 197,177 Q 193,181 188,183 Q 184,175 182,164 Z" fill="#7a3e10" opacity="0.5"/>

  <!-- Main head shape -->
  <ellipse cx="150" cy="170" rx="38" ry="36" fill="url(#labGrad)"/>
  <!-- Forehead highlight -->
  <ellipse cx="144" cy="154" rx="15" ry="10" fill="#f0c878" opacity="0.35"/>
  <!-- Cheek shading left -->
  <ellipse cx="122" cy="172" rx="12" ry="10" fill="#5a2e08" opacity="0.35"/>
  <!-- Cheek shading right -->
  <ellipse cx="178" cy="172" rx="12" ry="10" fill="#5a2e08" opacity="0.35"/>

  <!-- Muzzle -->
  <ellipse cx="150" cy="184" rx="22" ry="16" fill="url(#labMuzzle)" stroke="#a06030" stroke-width="0.5"/>
  <!-- Muzzle highlight -->
  <ellipse cx="145" cy="178" rx="8" ry="5" fill="#f8e0b0" opacity="0.4"/>
  <!-- Chin -->
  <ellipse cx="150" cy="196" rx="14" ry="7" fill="#c4904a"/>

  <!-- Nose -->
  <path d="M 140,178 Q 150,172 160,178 Q 160,186 150,188 Q 140,186 140,178 Z" fill="url(#noseGrad)"/>
  <!-- Nose highlight -->
  <ellipse cx="146" cy="178" rx="4" ry="2" fill="#888888" opacity="0.6"/>
  <!-- Nostril left -->
  <ellipse cx="143" cy="184" rx="2.5" ry="1.5" fill="#111111"/>
  <!-- Nostril right -->
  <ellipse cx="157" cy="184" rx="2.5" ry="1.5" fill="#111111"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="130" cy="162" rx="8" ry="7" fill="#111111"/>
  <ellipse cx="130" cy="162" rx="7" ry="6" fill="#8a4820"/>
  <circle cx="130" cy="162" r="5" fill="url(#eyeGrad)"/>
  <ellipse cx="128" cy="160" rx="2" ry="1.5" fill="white" opacity="0.7"/>
  <!-- Left eyelid -->
  <path d="M 122,159 Q 130,155 138,159" fill="none" stroke="#7a3808" stroke-width="1.2"/>
  <path d="M 122,165 Q 130,170 138,165" fill="none" stroke="#7a3808" stroke-width="1"/>
  <!-- Right eye -->
  <ellipse cx="170" cy="162" rx="8" ry="7" fill="#111111"/>
  <ellipse cx="170" cy="162" rx="7" ry="6" fill="#8a4820"/>
  <circle cx="170" cy="162" r="5" fill="url(#eyeGrad)"/>
  <ellipse cx="168" cy="160" rx="2" ry="1.5" fill="white" opacity="0.7"/>
  <!-- Right eyelid -->
  <path d="M 162,159 Q 170,155 178,159" fill="none" stroke="#7a3808" stroke-width="1.2"/>
  <path d="M 162,165 Q 170,170 178,165" fill="none" stroke="#7a3808" stroke-width="1"/>

  <!-- Eyebrow marks (typical lab feature) -->
  <ellipse cx="130" cy="153" rx="6" ry="2" fill="#f0c060" opacity="0.7" transform="rotate(-5 130 153)"/>
  <ellipse cx="170" cy="153" rx="6" ry="2" fill="#f0c060" opacity="0.7" transform="rotate(5 170 153)"/>

  <!-- Mouth line -->
  <path d="M 140,190 Q 150,195 160,190" fill="none" stroke="#7a3808" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chin crease -->
  <path d="M 148,192 Q 150,198 152,192" fill="none" stroke="#a06030" stroke-width="1" stroke-linecap="round"/>

  <!-- Whisker dots -->
  <circle cx="132" cy="187" r="1.2" fill="#5a2e08"/>
  <circle cx="128" cy="185" r="1" fill="#5a2e08"/>
  <circle cx="168" cy="187" r="1.2" fill="#5a2e08"/>
  <circle cx="172" cy="185" r="1" fill="#5a2e08"/>

</svg>
